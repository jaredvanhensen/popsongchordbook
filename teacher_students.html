<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Students - PopSongChordBook</title>
    <link rel="canonical" href="https://www.popsongchordbook.com/teacher_students.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=3.011">
    <style>
        .container {
            overflow-y: auto !important;
            padding: 0 !important;
            height: 100vh !important;
            display: flex !important;
            flex-direction: column !important;
        }

        .students-dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .students-section {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .student-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .student-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-color: #cbd5e1;
        }

        .unread-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: 800;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            padding: 0 6px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
        }

        .student-email {
            font-weight: 600;
            color: #334155;
            margin-bottom: 5px;
            font-size: 14px;
            padding-right: 30px; /* Leave room for badge */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .student-meta {
            color: #64748b;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Search input styling */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #1e293b;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #3b82f6;
        }

        /* Blue Header Styling */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 30px;
            margin: 0 0 20px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            color: white;
            border-radius: 0 0 12px 12px;
        }

        header::before {
            display: none !important;
        }

        header .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            width: 100%;
            margin-bottom: 0;
        }

        header .header-top-left {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }

        header .header-top-actions {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header .header-title-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 80px;
            box-sizing: border-box;
        }

        header h1 {
            background: none !important;
            background-clip: unset !important;
            -webkit-background-clip: unset !important;
            -webkit-text-fill-color: #ffffff !important;
            color: #ffffff !important;
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
            text-align: center;
        }

        header .header-subtitle {
            color: rgba(255, 255, 255, 0.8) !important;
            margin: 4px 0 0 0;
            font-size: 0.85rem;
            text-align: center;
        }

        header .back-icon-btn {
            background: rgba(255, 255, 255, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
        }

        header .back-icon-btn:hover {
            background: rgba(255, 255, 255, 0.3) !important;
        }

        header #addNewStudentBtn {
            background: #ffffff !important;
            color: #1e293b !important;
            border: none !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header #addNewStudentBtn:hover {
            background: #f1f5f9 !important;
        }

        @media (min-width: 1025px) {
            header .header-title-group {
                padding: 0 340px !important;
            }
        }

        @media (max-width: 820px) {
            header .header-top {
                flex-direction: column !important;
                gap: 12px !important;
            }
            header .header-top-left, header .header-top-actions {
                position: static !important;
                transform: none !important;
                justify-content: center !important;
                width: 100% !important;
            }
            header .header-title-group {
                padding: 0 !important;
            }
        }
    </style>
</head>

<body class="theme-classic">

    <div class="app-layout">
        <main class="app-main">
            <div class="container">
                <header style="position: relative; z-index: 100;">
                    <div class="header-top">
                        <div class="header-top-left">
                            <a href="teacher.html" class="back-icon-btn" title="Back to Dashboard">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M19 12H5M12 19l-7-7 7-7" />
                                </svg>
                            </a>
                        </div>
                        <div class="header-title-group">
                            <h1>My Connected Students</h1>
                            <p class="header-subtitle">Manage and track student progress</p>
                        </div>
                        <div class="header-top-actions">
                            <button id="addNewStudentBtn" class="back-icon-btn" title="Add Student" style="width: auto; height: 36px; padding: 0 14px; border-radius: 9999px; font-weight: bold; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                                👤 + Add Student
                            </button>
                        </div>
                    </div>
                </header>

                <div class="students-dashboard">
                    <div class="students-section">
                        <div class="search-container">
                            <input type="text" id="studentSearchInput" class="search-input" placeholder="Search by student email or name...">
                        </div>
                        <div id="studentsGrid" class="students-grid">
                            <!-- Loading State -->
                            <div class="empty-state">
                                <div class="empty-state-icon">⏳</div>
                                <p>Loading students...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Config -->
    <script src="js/config/firebase-config.js?v=3.011"></script>
    
    <!-- Utilities -->
    <script src="js/utils/FirebaseManager.js?v=3.011"></script>

    <!-- App Logic -->
    <script src="js/teacher_students.js?v=3.011"></script>

    <!-- Custom Professional Alert Modal Overlay -->
    <div id="customAlertModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100000; display: none; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 16px; padding: 24px; max-width: 380px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; display: flex; flex-direction: column; align-items: center;">
            <div style="width: 56px; height: 56px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; color: #ef4444; font-size: 28px; font-weight: bold;">⚠️</div>
            <h3 style="margin: 0 0 8px 0; color: #1e293b; font-size: 18px; font-weight: 800;">Notice</h3>
            <p id="customAlertMessage" style="color: #64748b; font-size: 14px; line-height: 1.5; margin: 0 0 20px 0;">
                Notice text.
            </p>
            <button type="button" id="closeCustomAlertBtn" style="width: 100%; padding: 12px; border: none; background: #1e293b; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s;">OK</button>
        </div>
    </div>

    <!-- Add Student Modal Overlay -->
    <div id="addStudentModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: none; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 16px; padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; max-height: 90vh; display: flex; flex-direction: column;">
            <h3 style="margin: 0 0 16px 0; color: #1e293b; font-size: 20px; font-weight: 800;">Add New Student</h3>
            
            <form id="addStudentForm" style="display: flex; flex-direction: column; gap: 14px;">
                <div>
                    <label for="addStudentNameInput" style="display: block; font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;">Student Name</label>
                    <input type="text" id="addStudentNameInput" required placeholder="e.g. John Doe" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1e293b; box-sizing: border-box;">
                </div>
                
                <div>
                    <label for="addStudentEmailInput" style="display: block; font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;">Student Email Address</label>
                    <input type="email" id="addStudentEmailInput" required placeholder="e.g. john@example.com" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1e293b; box-sizing: border-box;">
                </div>
                
                <div style="display: flex; gap: 12px; margin-top: 10px;">
                    <button type="button" id="closeAddStudentModalBtn" style="padding: 10px 20px; border: 1px solid #cbd5e1; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; color: #475569; flex: 1;">Cancel</button>
                    <button type="submit" id="sendInviteBtn" style="padding: 10px 20px; border: none; background: #166534; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1;">Send Invitation</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
