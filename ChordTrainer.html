<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chord Trainer | PopSongChordBook</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 110'><defs><linearGradient id='ps' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%2394a3b8'/><stop offset='1' stop-color='%23475569'/></linearGradient><linearGradient id='pf' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='white'/><stop offset='1' stop-color='%23f1f5f9'/></linearGradient><radialGradient id='ng' cx='50' cy='50' r='50'><stop offset='0' stop-color='%23a855f7'/><stop offset='1' stop-color='%236b21a8'/></radialGradient></defs><g transform='translate(5,5)'><rect y='10' width='150' height='90' rx='20' fill='url(%23ps)'/><rect width='150' height='90' rx='20' fill='url(%23pf)' stroke='%23e2e8f0'/><line x1='30' y1='50' x2='120' y2='50' stroke='%23cbd5e1' stroke-width='6' stroke-linecap='round'/><circle cx='75' cy='50' r='20' fill='url(%23ng)'/></g></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/chord-trainer.css">
</head>
<body>
    <header class="trainer-header">
        <div class="trainer-title-group">
            <a href="index.html" class="back-link" style="color: white; text-decoration: none; font-size: 1.5rem; margin-right: 15px;">‹</a>
            <h1 class="trainer-title">🎹 CHORD TRAINER</h1>
        </div>
        
        <div class="trainer-header-actions">
            <!-- Difficulty Level -->
            <div id="difficultyToggle" class="header-toggle active">
                <span class="icon">📈</span>
                <span id="difficultyLabel" class="label">LEVEL 1: TRIADS</span>
            </div>

            <!-- Audio Toggle -->
            <div id="audioToggle" class="header-toggle active">
                <span class="icon">🔊</span>
                <span class="label">AUDIO ON</span>
            </div>
            
            <!-- Inversions Toggle -->
            <div id="inversionToggle" class="header-toggle">
                <span class="icon">🔄</span>
                <span class="label">INVERSIONS OFF</span>
            </div>
            
            <!-- MIDI Status -->
            <div id="midiStatus" class="header-toggle" title="MIDI Keyboard Support">
                <span class="icon">⌨️</span>
                <span id="midiLabel" class="label">MIDI DISCONNECTED</span>
            </div>
        </div>
    </header>

    <div class="trainer-meta-row">
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="1">Notes → Chord</button>
            <button class="mode-btn" data-mode="2">Visual → Notes</button>
            <button class="mode-btn" data-mode="3">Chord → Keys</button>
            <button class="mode-btn" data-mode="4">Chord → Notes</button>
        </div>

        <div class="control-group" style="display: flex; gap: 12px; align-items: center;">
            <button id="timerCycleBtn" class="mode-btn" style="min-width: 120px;">⏱ FREE PLAY</button>
            <div id="countdown" class="countdown-display">00:00</div>
            <button id="openStatsBtn" class="open-stats-btn">
                <span class="icon">📊</span>
                <span class="label">STATS</span>
            </button>
        </div>
    </div>

    <main class="trainer-workbench">
        <!-- The Result Overlay (Shown for correct answers) -->
        <div id="resultOverlay" class="result-overlay">
            <span class="checkmark">✓</span>
        </div>

        <!-- The Chord Box -->
        <div id="chordBoxContainer" class="chord-box-container">
            <div class="chord-box">
                <h2 id="chordDisplay" class="chord-name">?</h2>
                <div id="notesDisplay" class="chord-notes"></div>
            </div>
        </div>

        <!-- The Keyboard -->
        <div class="keyboard-section">
            <div id="piano" class="piano">
                <!-- Keys will be generated by JS -->
            </div>
        </div>

        <!-- Multiple Choice Answers (For modes 1 and 2) -->
        <div id="answerOptions" class="mode-selector hidden" style="margin-top: -10px;">
            <!-- Buttons injected by JS -->
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons" style="display: flex; gap: 20px; z-index: 10;">
            <button id="checkBtn" class="mode-btn" style="background: #10b981; color: white; border: none; min-width: 150px; font-size: 1.1rem; padding: 12px 24px;">CHECK ANSWER</button>
            <button id="nextBtn" class="mode-btn" style="background: #4f46e5; color: white; border: none; min-width: 150px; font-size: 1.1rem; padding: 12px 24px;">NEXT CHORD</button>
        </div>
    </main>

    <footer class="trainer-footer">
        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">Current Score</span>
                <span id="currentScore" class="stat-value highlight">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Accuracy</span>
                <span id="accuracyValue" class="stat-value">0%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Best Streak</span>
                <span id="bestStreak" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Session Chords</span>
                <span id="totalChords" class="stat-value">0</span>
            </div>
        </div>
    </footer>

    <!-- Statistics Modal -->
    <div id="statsModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>📊 CHORD MASTERY</h2>
                <button id="closeStatsBtn" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="statsContent" class="stats-grid">
                    <!-- Stats rows injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Background Scripts -->
    <script src="js/utils/PianoAudioPlayer.js"></script>
    <script src="js/utils/ChordParser.js"></script>
    <script src="js/utils/MidiInputHandler.js"></script>
    <script src="js/ui/ChordTrainer.js"></script>
</body>
</html>
