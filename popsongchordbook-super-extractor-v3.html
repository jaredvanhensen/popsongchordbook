<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PopsongChordBook Converter v3</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:40px;
}

textarea{
width:100%;
height:260px;
font-family:monospace;
font-size:14px;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
margin-top:10px;
padding:10px 16px;
margin-right:10px;
font-size:15px;
}

#output{
background:white;
border:1px solid #ccc;
padding:15px;
margin-top:20px;
white-space:pre-wrap;
font-family:monospace;
}
</style>
</head>

<body>

<h2>PopsongChordBook Converter v3</h2>

Ultimate Guitar URL:

<input id="ugurl" placeholder="Paste Ultimate Guitar URL">

<button onclick="importUG()">Import From Ultimate Guitar</button>

<br><br>

Or paste chord sheet manually:

<textarea id="input"></textarea>

<br>

<button onclick="extract()">Extract</button>
<button onclick="copyJSON()">Copy JSON</button>
<button onclick="downloadJSON()">Download JSON</button>

<div id="output"></div>

<script>

const chordRegex=/^[A-G](#|b)?(maj7|maj|min|m|sus2|sus4|dim|aug|add9|6|7|9|11|13)?(\/[A-G](#|b)?)?$/i

const noteToSemitone = {
    'C': 0, 'C#': 1, 'Db': 1,
    'D': 2, 'D#': 3, 'Eb': 3,
    'E': 4, 'E#': 5, 'Fb': 4,
    'F': 5, 'F#': 6, 'Gb': 6,
    'G': 7, 'G#': 8, 'Ab': 8,
    'A': 9, 'A#': 10, 'Bb': 10,
    'B': 11, 'B#': 0, 'Cb': 11
};

function transposeChord(chordName, semitones) {
    if (!chordName || semitones === 0) return chordName;

    const transposePart = (part) => {
        const match = part.match(/^([A-G][#b]?)(.*)/i);
        if (!match) return part;

        let root = match[1];
        root = root.charAt(0).toUpperCase() + root.slice(1);
        const suffix = match[2];

        const startSemitone = noteToSemitone[root];
        if (startSemitone === undefined) return part;

        let target = (startSemitone + semitones) % 12;
        if (target < 0) target += 12;

        const notes = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
        return notes[target] + suffix;
    };

    if (chordName.includes('/')) {
        const [chord, bass] = chordName.split('/');
        return transposePart(chord) + '/' + transposePart(bass);
    }

    return transposePart(chordName);
}

function rootChord(chord){
return chord.replace(/(maj7|maj|min|m|sus2|sus4|dim|aug|add9|6|7|9|11|13).*/,"").split("/")[0]
}

function isChord(token){
return chordRegex.test(token.replace(/\*+$/,""))
}

function isChordLine(line){

let tokens=line.trim().split(/\s+/)

if(tokens.length===0) return false

let chordCount=0

tokens.forEach(t=>{
if(isChord(t)) chordCount++
})

return chordCount>0 && chordCount===tokens.length
}

function detectSection(line){

line=line.toLowerCase()

if(line.includes("verse")) return "verse"
if(line.includes("chorus")) return "chorus"
if(line.includes("bridge")) return "bridge"
if(line.includes("intro")) return "intro"
if(line.includes("outro")) return "outro"
if(line.includes("pre-chorus")||line.includes("prechorus")) return "preChorus"

return null
}

function ultraCompress(lines){

let tokens=[]

lines.forEach(line=>{
tokens.push(...line.split(/\s+/))
})

let result=[]
let i=0

while(i<tokens.length){

let bestPattern=null

for(let len=1;len<=8 && i+len<=tokens.length;len++){

let pattern=tokens.slice(i,i+len).join(" ")
let count=1
let pos=i+len

while(pos+len<=tokens.length){

if(tokens.slice(pos,pos+len).join(" ")===pattern){
count++
pos+=len
}else break
}

if(count>1){
    let score = len * count;
    if (!bestPattern || score > bestPattern.score || (score === bestPattern.score && len < bestPattern.len)) {
        bestPattern={pattern,len,count,score}
    }
}

}

if(bestPattern){

result.push(bestPattern.pattern+" "+bestPattern.count+"x")
i+=bestPattern.len*bestPattern.count

}else{

result.push(tokens[i])
i++

}

}

return result.join(" ")
}

function detectKey(allChords){

let roots=allChords.map(rootChord)

let freq={}

roots.forEach(r=>{
freq[r]=(freq[r]||0)+1
})

let max=0
let key=""

for(let r in freq){
if(freq[r]>max){
max=freq[r]
key=r
}
}

return key
}

let lastJSON=""

function extract(){

let lines=document.getElementById("input").value.split("\n")

let section="verse"

let sections={
verse:[],
chorus:[],
preChorus:[],
bridge:[],
intro:[],
outro:[]
}

let allChords=[]
let capo=0

lines.forEach(line=>{
let trimmed = line.trim()
let lower = trimmed.toLowerCase()

if (lower.includes("capo")) {
    let cm = trimmed.match(/capo[\s:]+(?:on\s+)?(?:fret\s+)?(\d+)/i)
          || trimmed.match(/capo[\s:]+(?:on\s+)?(\d+)(?:st|nd|rd|th)/i);
    if (cm) capo = parseInt(cm[1]) || 0;
}

let sec=detectSection(line)

if(sec){
section=sec
return
}

if(isChordLine(line)){

let cleaned=line.trim().replace(/\s{2,}/g," ").split(/\s+/).map(c=>c.replace(/\*+$/,"")).join(" ")

sections[section].push(cleaned)

cleaned.split(/\s+/).forEach(c=>{
allChords.push(c)
})

}

})

// Transpose if capo is present
if (capo > 0) {
    for (let secKey in sections) {
        sections[secKey] = sections[secKey].map(line => {
            return line.split(/\s+/).map(c => transposeChord(c, capo)).join(" ");
        });
    }
    allChords = allChords.map(c => transposeChord(c, capo));
}

let result={
artist:"",
title:"",
key:"",
verse:"",
chorus:"",
preChorus:"",
bridge:"",
intro:"",
outro:"",
capo:capo,
favorite:false
}

for(let key in sections){

if(sections[key].length>0){
result[key]=ultraCompress(sections[key])
}

}

result.key=detectKey(allChords)

lastJSON=JSON.stringify(result,null,2)

document.getElementById("output").textContent=lastJSON

}

function copyJSON(){

if(!lastJSON) return

navigator.clipboard.writeText(lastJSON)

alert("JSON copied")
}

function downloadJSON(){

if(!lastJSON) return

let blob=new Blob([lastJSON],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="song.json"

a.click()
}

async function importUG(){

let url=document.getElementById("ugurl").value

if(!url){
alert("Paste a URL first")
return
}

let proxy="https://api.allorigins.win/raw?url="

let response=await fetch(proxy+encodeURIComponent(url))

let html=await response.text()

let text=html.replace(/<[^>]+>/g,"\n")

text=text.replace(/\n{2,}/g,"\n")

document.getElementById("input").value=text

extractMeta(html)

alert("Page imported. Click Extract.")

}

function extractMeta(html){

let titleMatch=html.match(/<title>(.*?)<\/title>/i)

if(titleMatch){

let parts=titleMatch[1].split("-")

if(parts.length>=2){

let artist=parts[0].trim()
let title=parts[1].replace("Chords","").trim()

window.metaArtist=artist
window.metaTitle=title

}

}

}

</script>

</body>
</html>
