<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopsongChordBook Super Converter (v3 - Multi-Section)</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 20px;
            padding-bottom: 50px;
            color: #1a1a1a;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 1000px;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-header.json-header {
            background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%);
        }

        .card-header h2 {
            margin: 0;
            color: white;
            font-size: 1.5em;
            font-weight: 700;
        }

        .card-body {
            padding: 25px;
        }

        .json-import-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .file-input-wrapper {
            width: 100%;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f9fafb;
        }

        .file-input-wrapper:hover {
            border-color: #7c3aed;
            background: #f5f3ff;
        }

        .file-input-wrapper span {
            display: block;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .file-input-wrapper p {
            margin: 0;
            color: #4b5563;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            height: 350px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 20px;
            background: #fafafa;
        }

        button {
            padding: 12px 24px;
            margin-right: 12px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8fafc;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
        }

        #output {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            margin-top: 25px;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 8px;
            font-size: 14px;
            min-height: 120px;
            color: #334155;
        }

        .btn-green {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
            display: none;
            /* Hidden until JSON is ready */
        }

        .btn-green:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.4);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.hidden {
            display: none;
            opacity: 0;
        }

        .modal {
            background: white;
            width: 90%;
            max-width: 440px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .modal-header h3 {
            margin: 0;
            color: #1e293b;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-body {
            padding: 24px;
            color: #475569;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .modal-body strong {
            color: #1e293b;
        }

        .modal-footer {
            padding: 16px 24px 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .modal-btn-cancel {
            background: #f1f5f9;
            color: #64748b;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
        }

        .modal-btn-confirm {
            background: #7c3aed;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .modal-btn-confirm:hover {
            background: #6d28d9;
            transform: translateY(-1px);
        }

        /* Mobile Optimizations */
        @media screen and (max-width: 768px) {
            body {
                margin: 10px;
                padding: 0;
            }

            .card {
                border-radius: 8px;
                max-width: 100%;
            }

            .card-header {
                padding: 15px;
            }

            .card-header h2 {
                font-size: 1.2em;
            }

            .card-body {
                padding: 15px;
                display: flex;
                flex-direction: column;
            }

            textarea {
                height: 300px;
                font-size: 15px;
                margin-bottom: 15px;
                order: 1;
            }

            .button-group {
                display: flex;
                flex-direction: column;
                gap: 10px;
                order: 3;
            }

            button {
                width: 100%;
                margin-right: 0;
                margin-bottom: 0;
                padding: 14px;
                font-size: 16px;
                display: block;
            }

            #output {
                padding: 12px;
                font-size: 13px;
                margin-top: 0;
                margin-bottom: 15px;
                order: 2;
                min-height: 80px;
            }

            .btn-green {
                order: -1;
                /* Keep Import Now at the top once visible inside the button-group */
            }
        }
    </style>
</head>

<body>

    <!-- 1. JSON Import Section (Top) -->
    <div class="card">
        <div class="card-header json-header">
            <h2>📄 Quick JSON Import</h2>
        </div>
        <div class="card-body">
            <div class="json-import-container">
                <label for="quickJsonInput" class="file-input-wrapper">
                    <span>📥</span>
                    <p id="jsonFileName">Selecteer een .json liedje bestand...</p>
                    <input type="file" id="quickJsonInput" accept=".json" style="display: none;">
                </label>
                <button id="importJsonBtn" class="btn-primary" style="display: none; width: 100%; border-radius: 12px; height: 50px; font-size: 1.1em;" onclick="importSelectedJson()">Import Selected JSON</button>
            </div>
        </div>
    </div>

    <!-- 2. UG Import Section (Existing) -->
    <div class="card">
        <div class="card-header">
            <h2>🎸 Extract from Ultimate Guitar</h2>
        </div>
        <div class="card-body">
            <textarea id="input"
                placeholder="Paste the entire content of an Ultimate Guitar chord sheet here..."></textarea>

            <div class="button-group">
                <button class="btn-primary" onclick="extract()">Extract JSON</button>
                <button id="importBtn" class="btn-green" onclick="directImport()">IMPORT NOW</button>
                <button class="btn-secondary" onclick="copyJSON()">Copy to Clipboard</button>
                <button class="btn-secondary" onclick="downloadJSON()">Download .json</button>
            </div>

            <div id="output">JSON output will appear here...</div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="importModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Direct Import from Extractor</h3>
            </div>
            <div class="modal-body">
                Do you want to import <strong id="modalSongName">this song</strong> into your library?
            </div>
            <div class="modal-footer">
                <button class="modal-btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn-confirm" id="confirmImportBtn">Import Now</button>
            </div>
        </div>
    </div>

    <script>
        let selectedJsonData = null;

        // --- JSON Import Handling ---
        document.getElementById('quickJsonInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('jsonFileName').textContent = `Selected: ${file.name}`;
            document.getElementById('importJsonBtn').style.display = 'block';

            const reader = new FileReader();
            reader.onload = function (event) {
                try {
                    selectedJsonData = JSON.parse(event.target.result);
                    console.log("JSON parsed successfully:", selectedJsonData.title);
                } catch (err) {
                    alert("Ongeldig JSON bestand.");
                    selectedJsonData = null;
                    document.getElementById('importJsonBtn').style.display = 'none';
                    document.getElementById('jsonFileName').textContent = "Selecteer een .json liedje bestand...";
                }
            };
            reader.readAsText(file);
        });

        function importSelectedJson() {
            if (!selectedJsonData) return;
            postToMain(selectedJsonData);
        }

        function postToMain(song) {
            if (window.opener) {
                try {
                    window.opener.postMessage({
                        type: 'UG_EXTRACTOR_IMPORT',
                        song: song,
                        confirmed: false // Prompt for confirmation on main screen for JSON
                    }, '*');

                    // Visual feedback
                    const btn = document.getElementById("importJsonBtn");
                    const originalText = btn.innerHTML;
                    btn.innerHTML = "✅ IMPORTED!";
                    btn.style.background = "#059669";

                    setTimeout(() => {
                        window.close(); // Close window after import for mobile-like feel
                    }, 1000);
                } catch (e) {
                    alert("Main window not found. Please try again.");
                }
            } else {
                alert("Hoofdvenster niet gevonden.");
            }
        }

        function isChord(token) {
            // Remove common UG characters and punctuation that might be attached to chords
            const cleanToken = token.replace(/[\[\]\(\){}\.,|]/g, "").trim();
            if (!cleanToken) return false;

            // Support No Chord notation
            if (cleanToken.toUpperCase() === "NC" || cleanToken.toUpperCase() === "N.C") return true;

            // Support existing multipliers in input (e.g. 2x, 4x)
            if (/^\d+[xX]$/.test(cleanToken)) return true;

            // Robust Regex for chords including slash chords (e.g., E7/G#, D/F#)
            const strictChordRegex = /^[A-G][b#]?(?:m|maj|min|sus|dim|aug|add|M)?(?:\d{0,2})(?:[b#]\d{1,2})?(?:\/[A-G][b#]?)?$/i;

            const blackList = ["I", "As", "At", "Be", "By", "Do", "He", "In", "Is", "It", "Me", "No", "Or", "So", "To", "Up", "Us", "We"];
            if (blackList.includes(cleanToken)) return false;

            return strictChordRegex.test(cleanToken);
        }

        function detectSection(line) {
            const l = line.toLowerCase().replace(/[\[\]\(\){}:]/g, "").trim();
            if (l.includes("verse")) return { type: "verse", display: "V" };
            if (l.includes("chorus") && !l.includes("pre-") && !l.includes("prechorus")) return { type: "chorus", display: "C" };
            if (l.includes("pre-chorus") || l.includes("prechorus")) return { type: "preChorus", display: "PC" };
            if (l.includes("bridge") || l.includes("solo") || l.includes("instrumental") || l.includes("middle") || l.includes("interlude")) return { type: "bridge", display: "B" };
            if (l.includes("intro")) return { type: "intro", display: "Intro" };
            if (l.includes("outro")) return { type: "outro", display: "Outro" };
            return null;
        }

        function ultraCompress(tokens) {
            if (!tokens || tokens.length === 0) return "";

            let result = [];
            let i = 0;

            while (i < tokens.length) {
                let bestPattern = null;
                // Deep window (32) to catch long 8-bar phrasing
                for (let len = 1; len <= 32 && i + len <= tokens.length; len++) {
                    let patternStr = tokens.slice(i, i + len).join(" ");
                    let count = 1;
                    let pos = i + len;
                    while (pos + len <= tokens.length) {
                        if (tokens.slice(pos, pos + len).join(" ") === patternStr) {
                            count++;
                            pos += len;
                        } else { break; }
                    }

                    let score = len * count;
                    if (count > 1 && score >= (bestPattern ? bestPattern.score : 0)) {
                        // Strict tie-breaker: favor LONGER patterns to keep blocks unified
                        if (!bestPattern || score > bestPattern.score || (score === bestPattern.score && len > bestPattern.len)) {
                            bestPattern = { pattern: patternStr, len, count, score };
                        }
                    }
                }

                if (bestPattern) {
                    result.push(bestPattern.pattern + " " + bestPattern.count + "x");
                    i += bestPattern.len * bestPattern.count;
                } else {
                    result.push(tokens[i]);
                    i++;
                }
            }

            // Consolidation: Merge adjacent identical bases
            let consolidated = [];
            for (let k = 0; k < result.length; k++) {
                let cur = result[k];
                let curBase = cur.replace(/\s+\d+x$/i, "").trim();
                let curCount = 1;
                let match = cur.match(/\s+(\d+)x$/i);
                if (match) curCount = parseInt(match[1]);

                if (consolidated.length > 0) {
                    let last = consolidated[consolidated.length - 1];
                    let lastBase = last.replace(/\s+\d+x$/i, "").trim();
                    let lastCount = 1;
                    let lastMatch = last.match(/\s+(\d+)x$/i);
                    if (lastMatch) lastCount = parseInt(lastMatch[1]);

                    if (curBase === lastBase) {
                        consolidated[consolidated.length - 1] = curBase + " " + (lastCount + curCount) + "x";
                        continue;
                    }
                }
                consolidated.push(cur);
            }

            return consolidated.join(" ");
        }

        // Helper for fuzzy deduplication
        function getSimilarity(s1, s2) {
            let longer = s1.length > s2.length ? s1 : s2;
            let shorter = s1.length > s2.length ? s2 : s1;
            if (longer.length === 0) return 1.0;
            return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
        }

        function editDistance(s1, s2) {
            let costs = [];
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i === 0) costs[j] = j;
                    else {
                        if (j > 0) {
                            let newValue = costs[j - 1];
                            if (s1.charAt(i - 1) !== s2.charAt(j - 1))
                                newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                            costs[j - 1] = lastValue;
                            lastValue = newValue;
                        }
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return costs[s2.length];
        }

        let lastJSON = "";

        function extract() {
            let inputVal = document.getElementById("input").value;
            let lines = inputVal.split("\n");

            let sectionInstances = {
                intro: [], verse: [], chorus: [], preChorus: [], bridge: [], outro: []
            };

            let currentType = "intro";
            let artist = "", title = "", key = "", bpm = "";

            lines.forEach((line, idx) => {
                const trimmed = line.trim();
                if (!trimmed) return;
                const lower = trimmed.toLowerCase();

                if (idx < 5 && lower.includes(" chords by ")) {
                    const parts = trimmed.split(/ chords by /i);
                    title = parts[0].trim();
                    artist = parts[1].trim();
                    return;
                }

                if (lower.startsWith("artist:")) { artist = trimmed.replace(/artist:/i, "").trim(); return; }
                if (lower.startsWith("song:") || lower.startsWith("title:")) { title = trimmed.replace(/(song|title):/i, "").trim(); return; }

                if (lower.includes("key:")) {
                    const match = trimmed.match(/key:\s*([A-G][b#]?m?)/i);
                    if (match) key = match[1];
                }
                if (lower.includes("bpm:") || lower.includes("tempo:")) {
                    const match = trimmed.match(/(?:bpm|tempo):\s*(\d+)/i);
                    if (match) bpm = match[1];
                }

                if (lower.startsWith("tuning:") || lower.startsWith("key:") || lower.startsWith("capo:") || lower.startsWith("author:") || lower.includes("views")) return;

                let sec = detectSection(trimmed);
                if (sec) {
                    currentType = sec.type;
                    sectionInstances[currentType].push({ display: sec.display, chords: [] });
                    return;
                }

                const tokens = trimmed.split(/\s+/);
                let chords = tokens.filter(t => isChord(t));

                if (chords.length > 0 && (chords.length / tokens.length) > 0.4) {
                    if (sectionInstances[currentType].length === 0) {
                        sectionInstances[currentType].push({ display: "??", chords: [] });
                    }
                    const activeInstance = sectionInstances[currentType][sectionInstances[currentType].length - 1];

                    // Unroll multipliers at the line level (e.g. "C G 2x" -> "C G C G")
                    let lastToken = chords[chords.length - 1];
                    if (chords.length > 1 && /^\d+[xX]$/.test(lastToken)) {
                        let count = parseInt(lastToken);
                        chords.pop(); // remove multiplier
                        let base = [...chords];
                        for (let k = 1; k < count; k++) chords.push(...base);
                    }

                    activeInstance.chords.push(...chords);
                }
            });

            let result = {
                artist: artist || "Unknown Artist",
                title: title || "New Song",
                key: key || "",
                tempo: bpm || "",
                favorite: false
            };

            const sectionKeys = ["intro", "verse", "chorus", "preChorus", "bridge", "outro"];
            sectionKeys.forEach(key => {
                let uniqueInstances = [];

                sectionInstances[key].forEach((instance) => {
                    if (instance.chords.length === 0) return;
                    let compressed = ultraCompress(instance.chords);

                    // Normalize for fuzzy deduplication
                    let normalized = compressed.replace(/[\s\dXx]/g, "").toLowerCase();

                    let existingIdx = uniqueInstances.findIndex(inst => {
                        let otherNorm = inst.content.replace(/[\s\dXx]/g, "").toLowerCase();

                        // 1. Precise Match
                        if (normalized === otherNorm) return true;

                        // 2. Fuzzy Similarity Match (Threshold 85%)
                        // Catching "Chorus 1" vs "Chorus 2" with minor typos or extra chords
                        if (normalized.length > 15 && otherNorm.length > 15) {
                            if (getSimilarity(normalized, otherNorm) > 0.85) return true;
                        }
                        return false;
                    });

                    if (existingIdx === -1) {
                        uniqueInstances.push({ display: instance.display, content: compressed });
                    } else {
                        // If we find a match, keep the more "complete" (longer) version
                        let otherNorm = uniqueInstances[existingIdx].content.replace(/[\s\dXx]/g, "").toLowerCase();
                        if (normalized.length > otherNorm.length) {
                            uniqueInstances[existingIdx] = { display: instance.display, content: compressed };
                        }
                    }
                });

                if (uniqueInstances.length === 0) {
                    result[key] = "";
                } else if (uniqueInstances.length === 1) {
                    result[key] = uniqueInstances[0].content;
                } else {
                    result[key] = uniqueInstances.map((inst, idx) => `(${inst.display}${idx + 1}) ${inst.content}`).join(" ");
                }
            });

            lastJSON = JSON.stringify(result, null, 2);
            document.getElementById("output").textContent = lastJSON;

            const importBtn = document.getElementById("importBtn");
            if (importBtn) importBtn.style.display = "inline-block";
        }

        function directImport() {
            if (!lastJSON) return;
            const song = JSON.parse(lastJSON);
            const songName = `${song.artist || 'Unknown'} - ${song.title || 'Untitled'}`;

            // Show internal modal
            const modal = document.getElementById('importModal');
            const nameEl = document.getElementById('modalSongName');
            const confirmBtn = document.getElementById('confirmImportBtn');

            nameEl.textContent = songName;
            modal.classList.remove('hidden');

            confirmBtn.onclick = () => {
                const songName = `${song.artist || 'Unknown'} - ${song.title || 'Untitled'}`;
                if (window.opener) {
                    try {
                        window.opener.postMessage({
                            type: 'UG_EXTRACTOR_IMPORT',
                            song: song,
                            confirmed: true // Already confirmed here for UG extractor
                        }, '*');

                        // Show success feedback on the main button
                        const importBtn = document.getElementById("importBtn");
                        const originalText = importBtn.innerHTML;
                        importBtn.innerHTML = "✅ IMPORTED!";
                        importBtn.style.background = "#059669";

                        setTimeout(() => {
                            window.close(); // Close on mobile-like feel
                        }, 1000);
                    } catch (e) {
                        console.error("PostMessage failed", e);
                        alert("Verbinding verbroken.");
                    }
                } else {
                    alert("Main window not found.");
                }
                closeModal();
            };
        }

        function closeModal() {
            const modal = document.getElementById('importModal');
            if (modal) modal.classList.add('hidden');
        }

        function copyJSON() {
            if (!lastJSON) return;
            navigator.clipboard.writeText(lastJSON);
            alert("JSON copied!");
        }

        function downloadJSON() {
            if (!lastJSON) return;
            try {
                const data = JSON.parse(lastJSON);

                const clean = (str) => {
                    return str
                        .replace(/[^a-z0-9\s]/gi, '') // remove special chars
                        .split(/\s+/) // split by space
                        .map(w => w.charAt(0).toUpperCase() + w.slice(1)) // capitalize each word
                        .join(''); // join together
                };

                const safeArtist = clean(data.artist || "Unknown");
                const safeTitle = clean(data.title || "Song");
                const filename = `${safeArtist}-${safeTitle}.json`;

                let blob = new Blob([lastJSON], { type: "application/json" });
                let a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
            } catch (e) {
                console.error("Error generating filename", e);
            }
        }

    </script>

</body>

</html>
