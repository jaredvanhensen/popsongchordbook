<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Groups - PopSongChordBook</title>
    <link rel="canonical" href="https://www.popsongchordbook.com/teacher_groups.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=3.042">
    <style>
        .container {
            overflow-y: auto !important;
            padding: 0 !important;
            height: 100vh !important;
            display: flex !important;
            flex-direction: column !important;
        }

        .groups-dashboard {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .groups-section {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .group-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-card:hover {
            border-color: #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Blue Header Styling */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 30px;
            margin: 0 0 20px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            color: white;
            border-radius: 0 0 12px 12px;
        }

        header::before {
            display: none !important;
        }

        header .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            width: 100%;
            margin-bottom: 0;
        }

        header .header-top-left {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
        }

        header .header-top-actions {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header .header-title-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 80px;
            box-sizing: border-box;
        }

        header h1 {
            background: none !important;
            background-clip: unset !important;
            -webkit-background-clip: unset !important;
            -webkit-text-fill-color: #ffffff !important;
            color: #ffffff !important;
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
            text-align: center;
        }

        header .header-subtitle {
            color: rgba(255, 255, 255, 0.8) !important;
            margin: 4px 0 0 0;
            font-size: 0.85rem;
            text-align: center;
        }

        header .back-icon-btn {
            background: rgba(255, 255, 255, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
        }

        header .back-icon-btn:hover {
            background: rgba(255, 255, 255, 0.3) !important;
        }

        header #createGroupBtn {
            background: #ffffff !important;
            color: #1e293b !important;
            border: none !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header #createGroupBtn:hover {
            background: #f1f5f9 !important;
        }

        @media (min-width: 1025px) {
            header .header-title-group {
                padding: 0 340px !important;
            }
        }

        @media (max-width: 820px) {
            header .header-top {
                flex-direction: column !important;
                gap: 12px !important;
            }
            header .header-top-left, header .header-top-actions {
                position: static !important;
                transform: none !important;
                justify-content: center !important;
                width: 100% !important;
            }
            header .header-title-group {
                padding: 0 !important;
            }
        }
    </style>
</head>

<body class="theme-classic">

    <div class="app-layout">
        <main class="app-main">
            <div class="container">
                <header style="position: relative; z-index: 100;">
                    <div class="header-top">
                        <div class="header-top-left">
                            <a href="teacher.html" class="back-icon-btn" title="Back to Dashboard">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M19 12H5M12 19l-7-7 7-7" />
                                </svg>
                            </a>
                        </div>
                        <div class="header-title-group">
                            <h1>Student Groups</h1>
                            <p class="header-subtitle">Organize and manage your music bands and classes</p>
                        </div>
                        <div class="header-top-actions">
                            <button id="createGroupBtn" class="back-icon-btn" title="Create Group" style="width: auto; height: 36px; padding: 0 14px; border-radius: 9999px; font-weight: bold; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                                👥 + Create Group
                            </button>
                        </div>
                    </div>
                </header>

                <div class="groups-dashboard">
                    <div class="groups-section">
                        <div id="groupsGrid" style="display: flex; flex-direction: column; gap: 12px;">
                            <!-- Loading State -->
                            <div class="empty-state">
                                <div class="empty-state-icon">⏳</div>
                                <p>Loading groups...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Config -->
    <script src="js/config/firebase-config.js?v=3.042"></script>
    
    <!-- Utilities -->
    <script src="js/utils/FirebaseManager.js?v=3.042"></script>

    <!-- App Logic -->
    <script src="js/teacher_groups.js?v=3.042"></script>

    <!-- Custom Professional Alert Modal Overlay -->
    <div id="customAlertModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100000; display: none; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 16px; padding: 24px; max-width: 380px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; display: flex; flex-direction: column; align-items: center;">
            <div style="width: 56px; height: 56px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; color: #ef4444; font-size: 28px; font-weight: bold;">⚠️</div>
            <h3 style="margin: 0 0 8px 0; color: #1e293b; font-size: 18px; font-weight: 800;">Notice</h3>
            <p id="customAlertMessage" style="color: #64748b; font-size: 14px; line-height: 1.5; margin: 0 0 20px 0;">
                Notice text.
            </p>
            <button type="button" id="closeCustomAlertBtn" style="width: 100%; padding: 12px; border: none; background: #1e293b; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s;">OK</button>
        </div>
    </div>

    <!-- Group Creation Modal Overlay -->
    <div id="groupModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: none; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 16px; padding: 24px; max-width: 420px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; max-height: 90vh; display: flex; flex-direction: column;">
            <h3 id="groupModalTitle" style="margin: 0 0 16px 0; color: #1e293b; font-size: 20px; font-weight: 800;">Create Group</h3>
            
            <div id="groupForm" style="display: flex; flex-direction: column; gap: 14px; flex: 1; min-height: 0;">
                <input type="hidden" id="editGroupId">
                
                <div>
                    <label for="groupNameInput" style="display: block; font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;">Group Name</label>
                    <input type="text" id="groupNameInput" required placeholder="e.g. Monday Band" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1e293b; box-sizing: border-box;">
                </div>
                
                <div style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
                    <label style="display: block; font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;">Select Students</label>
                    <div id="groupStudentChecklist" style="border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; background: #f8fafc;">
                        <!-- Checklist options generated by JS -->
                    </div>
                </div>
                
                <div id="groupFormError" style="color: #dc2626; font-size: 12px; font-weight: 700; display: none; margin-bottom: 8px;">Please select at least one student.</div>
                <div style="display: flex; gap: 12px; margin-top: 10px; flex-shrink: 0;">
                    <button type="button" id="closeGroupModalBtn" style="padding: 10px 20px; border: 1px solid #cbd5e1; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; color: #475569; flex: 1;">Cancel</button>
                    <button type="button" id="saveGroupBtn" style="padding: 10px 20px; border: none; background: #166534; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1;">Save Group</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
