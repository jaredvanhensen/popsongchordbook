<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Dashboard - PopSongChordBook</title>
    <link rel="canonical" href="https://www.popsongchordbook.com/student.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2.888">
    <style>
        .container {
            overflow-y: auto !important;
            padding-bottom: 60px !important;
        }

        .student-dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .dashboard-header {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .teacher-info h2 {
            margin: 0 0 5px 0;
            color: #1e293b;
            font-size: 24px;
        }

        .section-panel {
            background: white; 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.1rem; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 800;
        }

        .assigned-song-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 600;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .assigned-song-link:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            transform: translateY(-1px);
        }

        /* Mobile Optimization */
        @media (max-width: 1024px) {
            .student-dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="theme-classic">

    <div class="app-layout">
        <main class="app-main">
            <div class="container">
                <header>
                    <div class="header-top">
                        <div class="header-top-left">
                            <a href="songlist.html" class="back-icon-btn" title="Back to Library">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M19 12H5M12 19l-7-7 7-7" />
                                </svg>
                            </a>
                        </div>
                        <div class="header-title-group">
                            <h1>Student Dashboard</h1>
                            <p class="header-subtitle">My Progress</p>
                        </div>
                    </div>
                </header>

                <div class="student-dashboard">
                    <div class="left-col">
                        <!-- Dashboard Header -->
                        <div class="dashboard-header" style="margin-bottom: 20px;">
                            <div style="font-size: 48px;">👨‍🏫</div>
                            <div class="teacher-info">
                                <p style="color: #64748b; margin: 0; font-size: 12px; font-weight: bold; text-transform: uppercase;">Connected Teacher</p>
                                <h2 id="teacherNameDisplay">Loading...</h2>
                            </div>
                        </div>

                        <!-- ASSIGNED SONGS SECTION -->
                        <div class="section-panel">
                            <h3 class="section-title" style="color: #ec4899;">🎵 Assigned Songs</h3>
                            <div id="assignedSongsContainer">
                                <div style="color: #64748b; font-size: 14px;">No songs assigned yet.</div>
                            </div>
                        </div>

                        <!-- HOMEWORK SECTION -->
                        <div class="section-panel" style="background: #eff6ff; border-color: #bfdbfe;">
                            <h3 class="section-title" style="color: #1d4ed8;">📚 Homework</h3>
                            <div id="studentHomeworkDate" style="font-size: 0.8rem; color: #3b82f6; font-weight: 600; margin-bottom: 6px;"></div>
                            <div id="studentHomeworkText" style="font-size: 0.9rem; color: #1e293b; white-space: pre-wrap;">No homework assigned.</div>
                        </div>

                        <!-- LINKS SECTION -->
                        <div class="section-panel" style="background: #faf5ff; border-color: #e9d5ff;">
                            <h3 class="section-title" style="color: #7c3aed;">🔗 Helpful Links</h3>
                            <div id="studentLinksContainer" style="display: flex; flex-direction: column; gap: 8px;">
                                <div style="color: #64748b; font-size: 14px;">No links added.</div>
                            </div>
                        </div>

                    </div> <!-- End of left-col -->

                    <div class="right-col">
                        <!-- GOALS SECTION -->
                        <div class="section-panel" style="background: #f0fdf4; border-color: #bbf7d0; height: 100%;">
                            <h3 id="studentGoalsHeaderTitle" class="section-title" style="color: #15803d;">🎯 My Goals</h3>
                            <div id="studentGoalsContainer" style="display: flex; flex-direction: column; gap: 0;">
                                <!-- Goals rendered by JS -->
                                <div style="color: #64748b; font-size: 14px;">Loading goals...</div>
                            </div>
                        </div>
                    </div> <!-- End of right-col -->

                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Config -->
    <script src="js/config/firebase-config.js?v=2.888"></script>
    
    <!-- Utilities -->
    <script src="js/utils/FirebaseManager.js?v=2.888"></script>

    <!-- App Logic -->
    <script src="js/student.js?v=2.888"></script>
</body>

</html>
